services:
  - type: web
    name: autopost-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn autopost_backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: TW_API_KEY
        sync: false
      - key: TW_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: TW_BEARER_TOKEN
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
